# Project data for portfolio.
#
# Schema (see _includes/project_card.html for rendering logic):
#   - id:                    short slug (unique)
#     section:               consulting | ai | foundational | other
#     manipulation_relevant: true | false   # floats to top within section
#     title:                 short project name
#     client:                company / context
#     year:                  "2024" or "2018-2020" etc.
#     hero:                  /assets/images/projects/<file>            (16:9 ideal)
#     video_local:           /assets/videos/projects/<file>.webm|mp4   (autoplay+muted+loop)
#     video_poster:          /assets/images/projects/<file>            (poster frame for video)
#     video_embed:           raw <iframe ...></iframe> string          (overrides hero, NOT video_local)
#     link:                  publicly hosted URL on the client's site / YouTube / etc.
#     role:                  "Led the X subsystem"
#     summary:               1-3 sentences: what I did + what was hard
#     tech:                  [ROS 2, MoveIt, MuJoCo, ...]
#
# DRAFT entries below — every summary/role line is a starting point. Edit freely.
# Items marked TODO need an asset (image or video) before they look right.

